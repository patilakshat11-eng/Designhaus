
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Haus — Indore | Modern · Minimal · Meaningful</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
/* ── BASE & VARIABLES ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }
:root {
  --bg-main: #FFFFFF;
  --bg-alt: #F8F6F2; 
  --text-dark: #231D1D;
  --text-muted: #6E6666;
  
  --brand-burgundy: #6A212C;
  --brand-burgundy-light: #8E303E;
  --brand-tan: #B59582;
  --brand-tan-light: #D1B8A8;
  
  --dark-bg: #161212;
  --dark-bg-alt: #1F1A1A;
  --dark-text: #F5F0E8;
  
  --line-light: rgba(42, 36, 36, 0.08);
  --line-dark: rgba(245, 240, 232, 0.12);
}

html { scroll-behavior: smooth; }
body { 
  background: var(--bg-main); 
  color: var(--text-dark); 
  font-family: 'Jost', sans-serif; 
  font-weight: 300; 
  overflow-x: hidden; 
  line-height: 1.65; 
}
a { color: inherit; text-decoration: none; }
img { display: block; width: 100%; height: 100%; object-fit: cover; }

/* ── CUSTOM TRAILING CURSOR ── */
#cursorDot { width: 6px; height: 6px; background: var(--brand-burgundy); border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000; transform: translate(-50%, -50%); transition: width 0.2s, height 0.2s; }
#cursorRing { width: 34px; height: 34px; border: 1px solid rgba(106, 33, 44, 0.3); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: transform 0.2s ease-out, border-color 0.2s; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg-alt); }
::-webkit-scrollbar-thumb { background: var(--brand-tan); }

/* ── NAVIGATION ── */
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1.5rem 4rem; display: flex; align-items: center; justify-content: space-between; transition: all 0.4s ease; }
nav.scrolled { background: rgba(255, 255, 255, 0.94); backdrop-filter: blur(16px); padding: 0.8rem 4rem; border-bottom: 1px solid var(--line-light); box-shadow: 0 4px 30px rgba(0,0,0,0.02); }

/* Prominent Logo Optimization */
.nav-logo img {height: 80px;             /* Keep the base container height consistent */
  width: auto;
  transform: scale(1.6);    /* Adjust this number to make it as large as you like (e.g., 1.5, 2.0) */
  transform-origin: left;   /* Keeps the logo anchored to the left while it grows */
  object-fit: contain;}
.nav-logo {
  display: flex;
  align-items: center;
  background: transparent;
  line-height: 0;   /* Removes any extra space added by default font height */
}
nav.scrolled .nav-logo img { height: 80px; }

.nav-links { display: flex; align-items: center; gap: 3rem; }
.nav-links a { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dark); transition: color 0.3s; }
.nav-links a:hover { color: var(--brand-burgundy); }
.nav-cta { padding: 0.6rem 1.6rem; border: 1px solid var(--brand-burgundy); color: var(--brand-burgundy) !important; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 500; transition: all 0.3s; }
.nav-cta:hover { background: var(--brand-burgundy); color: var(--bg-main) !important; }
.hamburger { display: none; flex-direction: column; gap: 5px; }
.hamburger span { display: block; width: 22px; height: 1px; background: var(--text-dark); }

/* ── HERO SECTION ── */
#hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; padding: 0 4rem; background: var(--bg-alt); }
.hero-bg-wrapper { position: absolute; inset: 0; opacity: 0.22; mix-blend-mode: multiply; z-index: 1; }
.hero-content { position: relative; z-index: 2; max-width: 850px; text-align: center; display: flex; flex-direction: column; align-items: center; margin-top: 2rem; }
.hero-eyebrow { font-size: 0.75rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--brand-burgundy); margin-bottom: 1.5rem; opacity: 0; animation: fadeUp 1s 0.2s forwards; font-weight: 500; }
.hero-h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3.2rem, 6.5vw, 5.8rem); font-weight: 400; line-height: 1.1; color: var(--text-dark); margin-bottom: 2rem; opacity: 0; animation: fadeUp 1s 0.4s forwards; }
.hero-h1 em { font-style: italic; color: var(--brand-tan); font-weight: 300; }
.hero-tagline { font-size: 0.95rem; letter-spacing: 0.25em; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-bottom: 3rem; opacity: 0; animation: fadeUp 1s 0.6s forwards; }
.hero-tagline span { color: var(--brand-tan); margin: 0 0.5rem; }
.hero-actions { display: flex; align-items: center; justify-content: center; gap: 2.5rem; opacity: 0; animation: fadeUp 1s 0.8s forwards; }

.btn-primary { padding: 0.9rem 2.6rem; background: var(--brand-burgundy); color: var(--bg-main); font-size: 0.78rem; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 500; transition: all 0.3s; border: 1px solid transparent; }
.btn-primary:hover { background: transparent; border-color: var(--brand-burgundy); color: var(--brand-burgundy); }
.btn-ghost { font-size: 0.78rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-dark); display: flex; align-items: center; gap: 0.8rem; transition: color 0.3s; font-weight: 500; }
.btn-ghost:hover { color: var(--brand-tan); }
.btn-ghost-arrow { width: 35px; height: 1px; background: currentColor; position: relative; transition: width 0.3s; }
.btn-ghost:hover .btn-ghost-arrow { width: 50px; }
.btn-ghost-arrow::after { content: ''; position: absolute; right: 0; top: -3px; width: 7px; height: 7px; border-top: 1px solid currentColor; border-right: 1px solid currentColor; transform: rotate(45deg); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

/* ── STATS BAND ── */
.stats-band { background: var(--bg-main); border-top: 1px solid var(--line-light); border-bottom: 1px solid var(--line-light); padding: 2.6rem 4rem; display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; position: relative; z-index: 10; }
.stat-item { text-align: center; }
.stat-num { font-family: 'Cormorant Garamond', serif; font-size: 3.2rem; font-weight: 300; color: var(--brand-burgundy); line-height: 1; margin-bottom: 0.4rem; }
.stat-label { font-size: 0.7rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-muted); font-weight: 400; }

/* ── SECTION ARCHITECTURE ── */
section { padding: 7.5rem 4rem; position: relative; z-index: 5; }
.section-tag { font-size: 0.7rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--brand-tan); display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; font-weight: 500; }
.section-tag::before { content: ''; display: block; width: 30px; height: 1px; background: var(--brand-tan); }
.section-h2 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.4rem, 4vw, 3.5rem); font-weight: 400; line-height: 1.2; color: var(--text-dark); }
.section-h2 em { font-style: italic; color: var(--brand-tan); font-weight: 300; }

/* ── ABOUT STUDIO ── */
#about { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 6rem; align-items: center; background: var(--bg-main); }
.about-desc { font-size: 1.02rem; line-height: 1.9; color: var(--text-muted); margin-top: 2rem; max-width: 500px; }
.about-quote { margin-top: 2.8rem; padding-left: 1.8rem; border-left: 2px solid var(--brand-burgundy); font-family: 'Cormorant Garamond', serif; font-size: 1.45rem; font-style: italic; color: var(--text-dark); line-height: 1.45; }
.about-right { position: relative; }
.about-img-frame { position: relative; aspect-ratio: 3/4; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.03); }
.about-img-frame img { transition: transform 1s ease; }
.about-img-frame:hover img { transform: scale(1.05); }
.about-img-badge { position: absolute; bottom: -1.5rem; left: -1.5rem; background: var(--brand-burgundy); color: var(--bg-main); padding: 1.6rem 2.2rem; font-family: 'Cormorant Garamond', serif; z-index: 3; }
.about-img-badge-num { font-size: 2.6rem; font-weight: 300; line-height: 1; display: block; }
.about-img-badge-text { font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; margin-top: 0.4rem; font-family: 'Jost', sans-serif; font-weight: 400; }

/* ── SERVICES SECTION ── */
#services { background: var(--bg-alt); }
.services-header { margin-bottom: 4.5rem; }
.services-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--line-light); }
.service-card { background: var(--bg-main); padding: 3rem 2.2rem; position: relative; transition: all 0.4s; }
.service-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--brand-tan); transform: scaleX(0); transform-origin: right; transition: transform 0.4s ease; }
.service-card:hover { background: #FAFAFA; transform: translateY(-3px); }
.service-card:hover::after { transform: scaleX(1); transform-origin: left; }
.service-num { font-family: 'Cormorant Garamond', serif; font-size: 3.2rem; font-weight: 300; color: rgba(106, 33, 44, 0.08); line-height: 1; margin-bottom: 1.5rem; transition: color 0.4s; }
.service-card:hover .service-num { color: rgba(181, 149, 130, 0.25); }
.service-title { font-family: 'Cormorant Garamond', serif; font-size: 1.45rem; font-weight: 500; color: var(--text-dark); margin-bottom: 0.9rem; }
.service-desc { font-size: 0.88rem; line-height: 1.8; color: var(--text-muted); margin-bottom: 1.8rem; }
.service-link { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--brand-burgundy); display: flex; align-items: center; gap: 0.4rem; transition: gap 0.3s; font-weight: 500; }
.service-card:hover .service-link { gap: 0.8rem; }

/* ── PORTFOLIO MASONRY ── */
#projects { background: var(--bg-main); }
.projects-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 4rem; }
.projects-filter { display: flex; gap: 0.6rem; }
.filter-btn { padding: 0.5rem 1.3rem; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; border: 1px solid var(--line-light); color: var(--text-muted); background: transparent; transition: all 0.3s; font-weight: 500; }
.filter-btn.active, .filter-btn:hover { border-color: var(--brand-burgundy); color: var(--brand-burgundy); }

.projects-masonry { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; }
.proj { overflow: hidden; position: relative; background: var(--bg-alt); }
/* Custom Masonry Grid Matrix */
.proj:nth-child(1) { grid-column: 1 / 7; grid-row: span 2; }
.proj:nth-child(2) { grid-column: 7 / 13; }
.proj:nth-child(3) { grid-column: 7 / 10; }
.proj:nth-child(4) { grid-column: 10 / 13; }
.proj:nth-child(5) { grid-column: 1 / 5; }
.proj:nth-child(6) { grid-column: 5 / 9; }
.proj:nth-child(7) { grid-column: 9 / 13; }

.proj-inner { width: 100%; height: 100%; min-height: 280px; position: relative; overflow: hidden; }
.proj:nth-child(1) .proj-inner { min-height: 580px; }
.proj img { position: absolute; inset: 0; transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1); }
.proj:hover img { transform: scale(1.05); }
.proj-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(22, 18, 18, 0.9) 0%, rgba(22, 18, 18, 0.2) 50%, transparent 100%); opacity: 0; transition: opacity 0.4s; }
.proj:hover .proj-overlay { opacity: 1; }
.proj-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 2rem; transform: translateY(10px); opacity: 0; transition: all 0.4s ease; z-index: 2; }
.proj:hover .proj-info { opacity: 1; transform: translateY(0); }
.proj-type { font-size: 0.68rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--brand-tan-light); margin-bottom: 0.4rem; font-weight: 400; }
.proj-name { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 400; color: #FFFFFF; }

/* ── PHILOSOPHY ── */
#philosophy { background: var(--dark-bg); text-align: center; padding: 8.5rem 4rem; color: var(--dark-text); position: relative; }
.philosophy-quote { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 3.5vw, 2.8rem); font-weight: 300; font-style: italic; line-height: 1.4; max-width: 850px; margin: 0 auto 2.5rem; color: #FFF; }
.philosophy-attr { font-size: 0.75rem; letter-spacing: 0.26em; text-transform: uppercase; color: var(--brand-tan); font-weight: 500; }

/* ── PROCESS SECTION ── */
#process { background: var(--bg-alt); }
.process-header { margin-bottom: 4.5rem; }
.process-steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; position: relative; }
.process-steps::before { content: ''; position: absolute; top: 22px; left: 40px; right: 40px; height: 1px; background: var(--line-light); }
.process-step { position: relative; }
.process-node { width: 44px; height: 44px; border: 1px solid var(--brand-tan); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1.8rem; background: var(--bg-alt); position: relative; z-index: 2; }
.process-node-dot { width: 10px; height: 10px; background: var(--brand-burgundy); border-radius: 50%; }
.process-meta { font-family: 'Cormorant Garamond', serif; font-size: 0.95rem; font-weight: 600; color: var(--brand-burgundy); margin-bottom: 0.4rem; letter-spacing: 0.05em; }
.process-title { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 500; color: var(--text-dark); margin-bottom: 0.8rem; }
.process-desc { font-size: 0.85rem; line-height: 1.8; color: var(--text-muted); }

/* ── EXPERIENCES / TESTIMONIALS ── */
#testimonials { background: var(--bg-main); }
.testimonials-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; margin-top: 4rem; }
.test-card { background: var(--bg-alt); padding: 3rem 2.2rem; border-radius: 2px; position: relative; }
.test-card::before { content: '“'; font-family: 'Cormorant Garamond', serif; font-size: 5rem; color: var(--brand-tan); position: absolute; top: 1rem; left: 1.5rem; opacity: 0.25; line-height: 1; }
.test-text { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-style: italic; line-height: 1.75; color: var(--text-dark); position: relative; z-index: 2; margin-bottom: 2rem; }
.test-user { display: flex; align-items: center; gap: 0.9rem; }
.test-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--brand-burgundy); color: #FFF; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 500; }
.test-name { font-size: 0.85rem; font-weight: 500; color: var(--text-dark); }
.test-role { font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.02em; }

/* ── CONTACT & FOOTER ── */
#contact { display: grid; grid-template-columns: 1fr 1fr; gap: 7rem; background: var(--dark-bg); color: var(--dark-text); }
#contact .section-h2 { color: #FFF; }
.contact-list { margin-top: 3rem; }
.contact-box { display: flex; gap: 1.2rem; margin-bottom: 2.2rem; }
.contact-icon { width: 40px; height: 40px; border: 1px solid var(--line-dark); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.contact-lbl { font-size: 0.68rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--brand-tan); margin-bottom: 0.3rem; font-weight: 500; }
.contact-val { font-size: 0.95rem; color: rgba(255,255,255,0.85); }

.form-group { margin-bottom: 1.4rem; }
.form-group label { display: block; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--brand-tan); margin-bottom: 0.6rem; font-weight: 500; }
.form-group input, .form-group textarea, .form-group select { width: 100%; background: var(--dark-bg-alt); border: 1px solid var(--line-dark); color: #FFF; padding: 1rem 1.2rem; font-family: 'Jost', sans-serif; font-size: 0.9rem; font-weight: 300; outline: none; transition: border-color 0.3s; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--brand-tan); }
.form-group textarea { min-height: 120px; resize: none; }
.form-btn { width: 100%; padding: 1.1rem; background: var(--brand-burgundy); color: #FFF; font-family: 'Jost', sans-serif; font-size: 0.8rem; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 500; border: none; transition: background 0.3s; margin-top: 0.8rem; }
.form-btn:hover { background: var(--brand-burgundy-light); }

footer { background: var(--dark-bg); border-top: 1px solid var(--line-dark); padding: 4.5rem 4rem 2.5rem; color: var(--dark-text); }
.footer-main { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 4rem; margin-bottom: 4rem; }

/* Foot Logo Visibility Scaling */
.footer-brand img { height: 58px; width: auto; margin-bottom: 1.2rem; filter: brightness(0) invert(1); object-fit: contain; }

.footer-text { font-size: 0.85rem; color: rgba(255,255,255,0.55); line-height: 1.7; max-width: 260px; }
.footer-head { font-size: 0.72rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--brand-tan); margin-bottom: 1.2rem; font-weight: 500; }
.footer-col a { display: block; font-size: 0.88rem; color: rgba(255,255,255,0.55); margin-bottom: 0.7rem; transition: color 0.3s; }
.footer-col a:hover { color: #FFF; }
.footer-meta { border-top: 1px solid var(--line-dark); padding-top: 2rem; display: flex; justify-content: space-between; align-items: center; }
.footer-copy { font-size: 0.75rem; color: rgba(255,255,255,0.4); }
.footer-socials { display: flex; gap: 0.8rem; }
.footer-socials a { width: 36px; height: 36px; border: 1px solid var(--line-dark); display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
.footer-socials a:hover { border-color: var(--brand-tan); background: rgba(181, 149, 130, 0.08); }
.footer-socials svg { width: 14px; height: 14px; stroke: rgba(255,255,255,0.6); fill: none; }
.footer-socials a:hover svg { stroke: var(--brand-tan); }

/* ── REVEAL TRIGGERS ── */
.reveal { opacity: 0; transform: translateY(35px); transition: opacity 0.9s cubic-bezier(0.25, 1, 0.5, 1), transform 0.9s cubic-bezier(0.25, 1, 0.5, 1); }
.reveal.visible { opacity: 1; transform: none; }
.reveal-delay-1 { transition-delay: 0.15s; }
.reveal-delay-2 { transition-delay: 0.3s; }

/* ── RESPONSIVENESS ── */
@media(max-width:1024px){
  nav, nav.scrolled { padding: 1.2rem 2rem; }
  section, #philosophy, footer { padding: 5rem 2rem; }
  .stats-band { padding: 2rem; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
  #about { grid-template-columns: 1fr; gap: 4rem; }
  .about-right { max-width: 500px; margin: 0 auto; width: 100%; }
  .services-grid { grid-template-columns: repeat(2, 1fr); }
  .projects-masonry { grid-template-columns: repeat(2, 1fr); gap: 15px; }
  .proj { grid-column: auto !important; grid-row: auto !important; }
  .proj-inner { min-height: 250px !important; }
  .process-steps { grid-template-columns: repeat(2, 1fr); gap: 2.5rem; }
  .process-steps::before { display: none; }
  .testimonials-grid { grid-template-columns: 1fr; }
  #contact { grid-template-columns: 1fr; gap: 4rem; }
  .footer-main { grid-template-columns: 1fr 1fr; gap: 2.5rem; }
}
@media(max-width:640px) {
  .nav-links { display: none; }
  .hamburger { display: flex; cursor: pointer; }
  .services-grid, .projects-masonry, .process-steps, .footer-main { grid-template-columns: 1fr; }
  .projects-header { flex-direction: column; align-items: flex-start; gap: 1.5rem; }
  .footer-meta { flex-direction: column; gap: 1.5rem; text-align: cen
